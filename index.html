
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SI.FA QC Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;margin:40px;background:#f5f5f5}
.box{background:white;padding:30px;border-radius:10px;max-width:400px;margin:auto}
input,button{width:100%;padding:10px;margin-top:10px}
button{background:#0b6efd;color:white;border:none;border-radius:5px}
</style>
</head>
<body>

<div class="box">
<h2>SI.FA QC Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<script>
const SUPABASE_URL = "SUPABASE_URL_PLACEHOLDER";
const SUPABASE_KEY = "SUPABASE_KEY_PLACEHOLDER";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login(){
 const email=document.getElementById("email").value;
 const password=document.getElementById("password").value;

 const {data,error}=await client.auth.signInWithPassword({
   email:email,
   password:password
 });

 if(error){
   document.getElementById("msg").innerText="Login error: "+error.message;
 }else{
   window.location="app.html";
 }
}
</script>

</body>
</html>
