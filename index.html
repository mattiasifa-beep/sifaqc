<!DOCTYPE html><html><head><meta charset="UTF-8"><title>SI.FA QC Login</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase.js"></script></head><body><div class="wrap"><div class="card"><h2>Login SI.FA QC</h2><input id="email" placeholder="email"><input id="password" type="password" placeholder="password"><button onclick="login()">Login</button><p id="msg"></p></div></div><script>const client=supabase.createClient(window.SUPABASE_URL,window.SUPABASE_KEY);async function login(){const email=document.getElementById("email").value;const password=document.getElementById("password").value;const{data,error}=await client.auth.signInWithPassword({email,password});if(error){document.getElementById("msg").innerText=error.message;}else{window.location="app.html";}}</script></body></html>
